name: KMBWidget
options:
  bundleIdPrefix: com.eddie
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: ""   # ← 填你的 Apple Developer Team ID (可先留空 simulator 測試)
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  # ── Main App ──────────────────────────────────────────
  KMBWidget:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: KMBWidget/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.eddie.kmbwidget
        INFOPLIST_FILE: KMBWidget/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"   # iPhone + iPad
        APP_GROUP_ENTITLEMENTS: YES
    entitlements:
      path: KMBWidget/KMBWidget.entitlements
    dependencies:
      - target: KMBWidgetExtension

  # ── Widget Extension ──────────────────────────────────
  KMBWidgetExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: KMBWidgetExtension/Sources
      # Shared files (compile in both targets)
      - path: KMBWidget/Sources/Models/Models.swift
      - path: KMBWidget/Sources/API/KMBAPIClient.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.eddie.kmbwidget.widget
        INFOPLIST_FILE: KMBWidgetExtension/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"
    entitlements:
      path: KMBWidgetExtension/KMBWidgetExtension.entitlements
