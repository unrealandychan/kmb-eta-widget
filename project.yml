name: KMBWidget
options:
  bundleIdPrefix: com.eddie
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: ""   # ← 填你的 Apple Developer Team ID (可先留空)
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  # ── Main macOS App ─────────────────────────────────────
  KMBWidget:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: KMBWidget/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.eddie.kmbwidget
        INFOPLIST_FILE: KMBWidget/Info.plist
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_ENTITLEMENTS: KMBWidget/KMBWidget.entitlements
        ENABLE_APP_SANDBOX: YES
    entitlements:
      path: KMBWidget/KMBWidget.entitlements
    dependencies:
      - target: KMBWidgetExtension
        embed: true

  # ── WidgetKit Extension (macOS 桌面 Widget) ─────────────
  KMBWidgetExtension:
    type: app-extension
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: KMBWidgetExtension/Sources
      - path: KMBWidget/Sources/Models/Models.swift
      - path: KMBWidget/Sources/API/KMBAPIClient.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.eddie.kmbwidget.widget
        INFOPLIST_FILE: KMBWidgetExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: KMBWidgetExtension/KMBWidgetExtension.entitlements
        ENABLE_APP_SANDBOX: NO
        OTHER_SWIFT_FLAGS: "-DWIDGET_EXTENSION"
    entitlements:
      path: KMBWidgetExtension/KMBWidgetExtension.entitlements

  # ── Menu Bar App ────────────────────────────────────────
  KMBMenuBar:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: KMBMenuBar/Sources
      - path: KMBWidget/Sources/Models/Models.swift
      - path: KMBWidget/Sources/API/KMBAPIClient.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.eddie.kmbwidget.menubar
        INFOPLIST_FILE: KMBMenuBar/Info.plist
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_ENTITLEMENTS: KMBMenuBar/KMBMenuBar.entitlements
    entitlements:
      path: KMBMenuBar/KMBMenuBar.entitlements
